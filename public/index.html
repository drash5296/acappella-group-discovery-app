<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>アカペラグループ発掘アプリ</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg1:#0d0d1a;--bg2:#12122a;--accent:#a855f7;--accent2:#6366f1;
  --gold:#f59e0b;--card:#1a1a35;--card2:#22224a;--text:#e2e8f0;--sub:#94a3b8;
}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg1);color:var(--text);min-height:100vh;overflow-x:hidden}
 
/* ── Starfield ── */
#stars{position:fixed;inset:0;pointer-events:none;z-index:0}
.star{position:absolute;border-radius:50%;background:#fff;animation:twinkle var(--d,3s) infinite}
@keyframes twinkle{0%,100%{opacity:.2}50%{opacity:.9}}
 
/* ── Layout ── */
.screen{display:none;position:relative;z-index:1;min-height:100vh;padding:24px 16px;justify-content:center;align-items:center;flex-direction:column}
.screen.active{display:flex}
 
/* ── Language Screen ── */
.logo{font-size:3.5rem;margin-bottom:8px;text-align:center}
.app-title{font-size:1.8rem;font-weight:800;text-align:center;background:linear-gradient(135deg,#a855f7,#6366f1,#ec4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
.app-sub{color:var(--sub);text-align:center;margin-bottom:40px;font-size:.95rem;line-height:1.6}
.lang-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;max-width:600px;width:100%}
.lang-btn{background:var(--card);border:1.5px solid #2d2d5e;border-radius:14px;padding:16px 12px;cursor:pointer;color:var(--text);font-size:.95rem;font-weight:600;display:flex;align-items:center;gap:10px;transition:all .2s;justify-content:center}
.lang-btn:hover{border-color:var(--accent);background:var(--card2);transform:translateY(-2px);box-shadow:0 8px 25px rgba(168,85,247,.3)}
.lang-flag{font-size:1.5rem}
 
/* ── Quiz Screen ── */
.quiz-wrap{max-width:680px;width:100%;display:flex;flex-direction:column;gap:24px}
.quiz-header{display:flex;justify-content:space-between;align-items:center}
.quiz-logo{font-size:1.1rem;font-weight:700;color:var(--accent)}
.progress-text{color:var(--sub);font-size:.9rem}
.progress-bar{width:100%;height:6px;background:#2d2d5e;border-radius:99px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent2),var(--accent));border-radius:99px;transition:width .4s ease}
.question-card{background:var(--card);border:1.5px solid #2d2d5e;border-radius:20px;padding:32px;min-height:260px;display:flex;flex-direction:column;gap:24px}
.q-number{color:var(--accent);font-size:.85rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase}
.q-text{font-size:1.25rem;font-weight:700;line-height:1.5;flex:1}
.options-wrap{display:flex;flex-direction:column;gap:10px;margin:15px 0}
.radio-label{display:flex;align-items:center;gap:12px;background:var(--card2);border:1.5px solid #2d2d5e;color:var(--text);border-radius:12px;padding:14px;font-size:1rem;font-weight:600;cursor:pointer;transition:all .2s;}
.radio-label:hover{border-color:var(--accent);background:var(--card)}
.radio-label input[type="radio"] { transform: scale(1.5); accent-color: var(--accent); cursor: pointer; margin-right: 8px;}
.radio-label.selected { background:rgba(168,85,247,0.1); border-color:var(--accent); }
.nav-btns{display:flex;gap:12px;justify-content:space-between}
.btn{border:none;border-radius:12px;padding:14px 28px;font-size:1rem;font-weight:700;cursor:pointer;transition:all .2s}
.btn-ghost{background:var(--card2);color:var(--sub);border:1.5px solid #2d2d5e}
.btn-ghost:hover{border-color:var(--accent);color:var(--text)}
.btn-primary{background:linear-gradient(135deg,var(--accent2),var(--accent));color:#fff;box-shadow:0 4px 20px rgba(168,85,247,.4)}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(168,85,247,.5)}
.btn-primary:disabled{opacity:.4;cursor:not-allowed;transform:none}
 
/* ── Result Screen ── */
.result-wrap{max-width:760px;width:100%;display:flex;flex-direction:column;gap:28px;padding-bottom:40px}
.result-title{font-size:1.6rem;font-weight:800;text-align:center;background:linear-gradient(135deg,var(--gold),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.result-sub{text-align:center;color:var(--sub);font-size:.9rem}
.group-card{background:var(--card);border:1.5px solid #2d2d5e;border-radius:20px;padding:24px;display:flex;flex-direction:column;gap:16px;transition:border-color .2s}
.group-card:hover{border-color:var(--accent)}
.group-card.rank-1{border-color:var(--gold);box-shadow:0 0 30px rgba(245,158,11,.2)}
.group-top{display:flex;align-items:flex-start;gap:16px}
.rank-badge{min-width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.3rem;font-weight:900;flex-shrink:0}
.rank-1 .rank-badge{background:linear-gradient(135deg,#f59e0b,#d97706);color:#000}
.rank-2 .rank-badge{background:linear-gradient(135deg,#94a3b8,#64748b);color:#fff}
.rank-3 .rank-badge{background:linear-gradient(135deg,#cd7c45,#a05a2c);color:#fff}
.rank-other .rank-badge{background:var(--card2);color:var(--sub)}
.group-info{flex:1;min-width:0}
.group-name{font-size:1.2rem;font-weight:800;margin-bottom:4px}
.group-meta{color:var(--sub);font-size:.82rem;display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px}
.group-tag{background:#2d2d5e;border-radius:6px;padding:2px 8px}
.group-desc{font-size:.88rem;line-height:1.6;color:#c4c4e0}
.match-bar-wrap{display:flex;align-items:center;gap:12px}
.match-label{font-size:.82rem;color:var(--sub);white-space:nowrap}
.match-bar{flex:1;height:8px;background:#2d2d5e;border-radius:99px;overflow:hidden}
.match-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--accent2),var(--accent));transition:width 1s ease}
.rank-1 .match-fill{background:linear-gradient(90deg,var(--gold),#f59e0b)}
.match-pct{font-weight:800;font-size:.95rem;color:var(--accent)}
.rank-1 .match-pct{color:var(--gold)}
.songs-section{border-top:1px solid #2d2d5e;padding-top:14px}
.songs-title{font-size:.82rem;font-weight:700;color:var(--sub);letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px}
.songs-list{display:flex;flex-direction:column;gap:8px}
.song-row{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
.song-name{font-size:.9rem;color:var(--text);flex:1}
.yt-btn{background:#ff0000;color:#fff;border:none;border-radius:8px;padding:5px 12px;font-size:.78rem;font-weight:700;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:5px;transition:opacity .2s;white-space:nowrap}
.yt-btn:hover{opacity:.85}
.restart-wrap{text-align:center;padding-top:8px}
.btn-restart{background:transparent;border:1.5px solid #2d2d5e;color:var(--sub);border-radius:12px;padding:12px 28px;font-size:.95rem;font-weight:600;cursor:pointer;transition:all .2s}
.btn-restart:hover{border-color:var(--accent);color:var(--text)}
 
/* ── Analyzing overlay ── */
#analyzing{display:none;position:fixed;inset:0;z-index:100;background:rgba(13,13,26,.9);justify-content:center;align-items:center;flex-direction:column;gap:20px}
#analyzing.show{display:flex}
.spin{width:60px;height:60px;border:4px solid #2d2d5e;border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.analyzing-text{color:var(--text);font-size:1.1rem;font-weight:600}
 
@media(max-width:480px){
  .app-title{font-size:1.4rem}
  .logo{font-size:2.8rem}
  .q-text{font-size:1.05rem}
  .group-name{font-size:1rem}
}
</style>
</head>
<body>
 
<canvas id="stars"></canvas>
<div id="analyzing"><div class="spin"></div><div class="analyzing-text" id="analyzing-text">分析中...</div></div>
 
<!-- ① Language Screen -->
<div class="screen active" id="lang-screen">
  <div class="logo">🎵</div>
  <div class="app-title" id="app-title">アカペラグループ発掘アプリ</div>
  <div class="app-sub" id="app-sub">10の質問に答えて、あなたにぴったりの<br>アカペラグループを発見しよう！</div>
  <div class="lang-grid">
    <button class="lang-btn" onclick="selectLang('ja')"><span class="lang-flag">🇯🇵</span>日本語</button>
    <button class="lang-btn" onclick="selectLang('en')"><span class="lang-flag">🇺🇸</span>English</button>
    <button class="lang-btn" onclick="selectLang('zh')"><span class="lang-flag">🇨🇳</span>中文</button>
    <button class="lang-btn" onclick="selectLang('ko')"><span class="lang-flag">🇰🇷</span>한국어</button>
    <button class="lang-btn" onclick="selectLang('de')"><span class="lang-flag">🇩🇪</span>Deutsch</button>
    <button class="lang-btn" onclick="selectLang('fr')"><span class="lang-flag">🇫🇷</span>Français</button>
    <button class="lang-btn" onclick="selectLang('it')"><span class="lang-flag">🇮🇹</span>Italiano</button>
  </div>
</div>
 
<!-- ② Quiz Screen -->
<div class="screen" id="quiz-screen">
  <div class="quiz-wrap">
    <div class="quiz-header">
      <div class="quiz-logo">🎵 A Cappella</div>
      <div class="progress-text" id="prog-text">1 / 10</div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:10%"></div></div>
    <div class="question-card">
      <div class="q-number" id="q-number">Q 1</div>
      <div class="q-text" id="q-text">質問テキスト</div>
      <div class="options-wrap" id="options-wrap">
        <label class="radio-label"><input type="radio" name="q-option" value="1" onchange="selectOpt(1)"> <span id="opt-1">全くそう思わない</span></label>
        <label class="radio-label"><input type="radio" name="q-option" value="3" onchange="selectOpt(3)"> <span id="opt-3">あまりそう思わない</span></label>
        <label class="radio-label"><input type="radio" name="q-option" value="5" onchange="selectOpt(5)"> <span id="opt-5">どちらともいえない</span></label>
        <label class="radio-label"><input type="radio" name="q-option" value="8" onchange="selectOpt(8)"> <span id="opt-8">ややそう思う</span></label>
        <label class="radio-label"><input type="radio" name="q-option" value="10" onchange="selectOpt(10)"> <span id="opt-10">とてもそう思う</span></label>
      </div>
    </div>
    <div class="nav-btns">
      <button class="btn btn-ghost" id="btn-prev" onclick="prevQ()">← <span id="lbl-prev">前へ</span></button>
      <button class="btn btn-primary" id="btn-next" onclick="nextQ()"><span id="lbl-next">次へ</span> →</button>
    </div>
  </div>
</div>
 
<!-- ③ Result Screen -->
<div class="screen" id="result-screen">
  <div class="result-wrap">
    <div class="result-title" id="result-title">🏆 あなたにおすすめのグループ</div>
    <div class="result-sub" id="result-sub">回答をもとにマッチ度を算出しました</div>
    <div id="result-cards"></div>
    <div class="restart-wrap">
      <button class="btn-restart" onclick="restart()" id="btn-restart">🔄 もう一度やり直す</button>
    </div>
  </div>
</div>

(function initStars(){
  const c=document.getElementById('stars');
  const ctx=c.getContext('2d');
  c.width=window.innerWidth; c.height=window.innerHeight;
  window.addEventListener('resize',()=>{c.width=window.innerWidth;c.height=window.innerHeight;drawStars()});
  function drawStars(){
    ctx.clearRect(0,0,c.width,c.height);
    for(let i=0;i<200;i++){
      const x=Math.random()*c.width, y=Math.random()*c.height;
      const r=Math.random()*1.5;
      ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2);
      ctx.fillStyle=`rgba(255,255,255,${Math.random()*0.7+0.1})`;
      ctx.fill();
    }
  }
  drawStars();
})();

  renderQ();
}

function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function selectOpt(val) {
  answers[current] = parseInt(val);
  
  document.querySelectorAll('input[name="q-option"]').forEach(r => {
    if(parseInt(r.value) === answers[current]){
       r.checked = true;
       r.parentElement.classList.add('selected');
    } else {
       r.checked = false;
       r.parentElement.classList.remove('selected');
    }
  });

  document.getElementById('btn-next').disabled = false;
}

function renderQ(){
  const t=T[lang];
  const q=questions[current];
  const n=current+1;
  document.getElementById('prog-text').textContent=`${n} / 10`;
  document.getElementById('prog-fill').style.width=`${n*10}%`;
  document.getElementById('q-number').textContent=`Q ${n}`;
  document.getElementById('q-text').textContent=q[lang]||q['en'];
  
  if (t.opts) {
      document.getElementById('opt-1').textContent = t.opts[0];
      document.getElementById('opt-3').textContent = t.opts[1];
      document.getElementById('opt-5').textContent = t.opts[2];
      document.getElementById('opt-8').textContent = t.opts[3];
      document.getElementById('opt-10').textContent = t.opts[4];
  }
  
  let val = answers[current];
  document.querySelectorAll('input[name="q-option"]').forEach(r => {
    if(val !== undefined && parseInt(r.value) === val){
       r.checked = true;
       r.parentElement.classList.add('selected');
    } else {
       r.checked = false;
       r.parentElement.classList.remove('selected');
    }
  });
  
  document.getElementById('btn-next').disabled = (val === undefined);
  document.getElementById('lbl-prev').textContent=t.prev;
  document.getElementById('btn-prev').disabled=current===0;
  
  const nextBtn=document.getElementById('btn-next');
  const nextLbl=document.getElementById('lbl-next');
  if(current===9){
    nextLbl.textContent=t.seeResult;
    nextBtn.textContent=t.seeResult;
  } else {
    nextBtn.innerHTML=`<span id="lbl-next">${t.next}</span> →`;
  }
}

function prevQ(){
  if(current>0){current--;renderQ();}
}

function nextQ(){
  if(answers[current] === undefined) return;
  if(current<9){
     if(current === questions.length - 1) {
        let val = answers[current];
        let q = questions[current];
        let targetDim = null;
        if(val >= 8) {
           let rels = [q.dim].concat(relatedDims[q.dim] || []);
           targetDim = rels[Math.floor(Math.random() * rels.length)];
        } else if (val <= 3) {
           targetDim = null;
        }
        
        let unasked = QPOOL.filter(x => !askedIds.includes(x.id || x.ja));
        let pool = targetDim ? unasked.filter(x => x.dim === targetDim) : [];
        if(pool.length === 0) pool = unasked;
        
        let next = pool[Math.floor(Math.random() * pool.length)];
        questions.push(next);
        askedIds.push(next.id || next.ja);
     }
     current++;
     renderQ();
  }
  else showResults();
}

// ─────────────────────────────────────────────
// SCORING
// ─────────────────────────────────────────────
function computeScores(){
  // Aggregate user answers per dimension
  const dimSums={}, dimCounts={};
  questions.forEach((q,i)=>{
    const d=q.dim;
    dimSums[d]=(dimSums[d]||0)+answers[i];
    dimCounts[d]=(dimCounts[d]||0)+1;
  });
  const userProfile={};
  for(const d in dimSums) userProfile[d]=dimSums[d]/dimCounts[d];
 
  // Score each group
  const dims=['harmony','tempo','modern','size','energy','japanese','beatbox','upbeat','covers','gospel','jazz'];
  return GROUPS.map(g=>{
    let totalDiff=0, count=0;
    dims.forEach(d=>{
      if(userProfile[d]!==undefined){
        // size is reversed: user answer 10=small, group 10=small (consistent)
        totalDiff+=Math.abs(userProfile[d]-g.profile[d]);
        count++;
      }
    });
    const similarity= count>0 ? 1-(totalDiff/(9*count)) : 0;
    return {group:g, score:Math.round(similarity*100)};
  }).sort((a,b)=>b.score-a.score).slice(0,5);
}
 
function showResults(){
  const t=T[lang];
  document.getElementById('analyzing-text').textContent=t.analyzing;
  document.getElementById('analyzing').classList.add('show');
  setTimeout(()=>{
    document.getElementById('analyzing').classList.remove('show');
    const top5=computeScores();
    buildResultCards(top5);
    show('result-screen');
  },1800);
}
 
function buildResultCards(top5){
  const t=T[lang];
  document.getElementById('result-title').textContent=t.resultTitle;
  document.getElementById('result-sub').textContent=t.resultSub;
  document.getElementById('btn-restart').textContent=t.restart;
  const container=document.getElementById('result-cards');
  container.innerHTML='';
  const rankClass=['rank-1','rank-2','rank-3','rank-other','rank-other'];
  top5.forEach((item,idx)=>{
    const g=item.group;
    const rankLabel=t.ranks[idx];
    const card=document.createElement('div');
    card.className=`group-card ${rankClass[idx]}`;
    const desc=g.desc[lang]||g.desc['en'];
    const songs=g.songs.map(s=>`
      <div class="song-row">
        <span class="song-name">♪ ${s.name}</span>
        <a class="yt-btn" href="https://www.youtube.com/results?search_query=${encodeURIComponent(s.yt)}" target="_blank" rel="noopener">
          ▶ ${t.yt}
        </a>
      </div>`).join('');
    const tags=g.tags.map(tg=>`<span class="group-tag">${tg}</span>`).join('');
    card.innerHTML=`
      <div class="group-top">
        <div class="rank-badge">${rankLabel}</div>
        <div class="group-info">
          <div class="group-name">${g.name}</div>
          <div class="group-meta">
            <span>${t.origin}: ${g.origin}</span>
            ${tags}
          </div>
          <div class="group-desc">${desc}</div>
        </div>
      </div>
      <div class="match-bar-wrap">
        <span class="match-label">${t.match}</span>
        <div class="match-bar"><div class="match-fill" style="width:0%" data-pct="${item.score}%"></div></div>
        <span class="match-pct">${item.score}%</span>
      </div>
      <div class="songs-section">
        <div class="songs-title">${t.songs}</div>
        <div class="songs-list">${songs}</div>
      </div>`;
    container.appendChild(card);
  });
  // Animate match bars after paint
  requestAnimationFrame(()=>{
    requestAnimationFrame(()=>{
      document.querySelectorAll('.match-fill').forEach(el=>{
        el.style.width=el.dataset.pct;
      });
    });
  });
}
 
function restart(){
  show('lang-screen');
}
</script>
